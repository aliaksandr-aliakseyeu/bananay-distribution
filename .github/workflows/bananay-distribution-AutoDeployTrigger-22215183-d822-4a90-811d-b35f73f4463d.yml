name: Trigger auto deployment for bananay-distribution

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/bananay-distribution-AutoDeployTrigger-22215183-d822-4a90-811d-b35f73f4463d.yml'

  # Allow manual trigger 
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.BANANAYDISTRIBUTION_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: bananay.azurecr.io
          registryUsername: ${{ secrets.BANANAYDISTRIBUTION_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BANANAYDISTRIBUTION_REGISTRY_PASSWORD }}
          containerAppName: bananay-distribution
          resourceGroup: Bananay
          imageToBuild: bananay.azurecr.io/bananay-distribution:${{ github.sha }}
          
            

     


