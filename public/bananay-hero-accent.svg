<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>

    <radialGradient id="softGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(940 175) rotate(-7) scale(820 90)">
      <stop offset="0%" stop-color="#DCE8F8" stop-opacity="0.75"/>
      <stop offset="45%" stop-color="#E8F0FA" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#EDF3FA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="streakGlow" x1="40" y1="220" x2="1540" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="18%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="48%" stop-color="#FFFDF8" stop-opacity="0.9"/>
      <stop offset="72%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="blur36" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>

    <filter id="blur8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#heroBg)"/>

  <!-- soft blue haze around headline level -->
  <ellipse cx="940" cy="175" rx="820" ry="90" transform="rotate(-7 940 175)" fill="url(#softGlow)" filter="url(#blur36)"/>

  <!-- main decorative line -->
  <path d="M30 260 C 360 242, 760 210, 1540 110" stroke="url(#streakGlow)" stroke-width="6" stroke-linecap="round" filter="url(#blur8)"/>
  <path d="M55 257 C 380 240, 775 209, 1550 112" stroke="#FFFDF8" stroke-opacity="0.78" stroke-width="1.7" stroke-linecap="round"/>
</svg>
